<body>
    <div id="debugLog"></div>
    <button id="debugClose" onclick="document.getElementById('debugLog').style.display='none'; this.style.display='none';">✕ ЗАКРЫТЬ ЛОГ</button>

    <script>
        function dlog(msg) {
            var el = document.getElementById('debugLog');
            if (el) {
                el.textContent += msg + '\n';
                el.scrollTop = el.scrollHeight;
            }
            console.log(msg);
        }

        window.onerror = function(msg, url, line) {
            dlog('ERROR: ' + msg + ' line:' + line);
        };

        dlog('=== PAGE LOADED ===');
        dlog('URL: ' + location.href.substr(0, 60));
        dlog('Screen: ' + screen.width + 'x' + screen.height);
        dlog('Window: ' + window.innerWidth + 'x' + window.innerHeight);

        if (window.Telegram && window.Telegram.WebApp) {
            var tg = window.Telegram.WebApp;
            dlog('TG version: ' + tg.version);
            dlog('TG platform: ' + (tg.platform || '?'));
            dlog('TG isFullscreen: ' + tg.isFullscreen);
            dlog('TG viewportHeight: ' + tg.viewportHeight);
            dlog('TG viewportStableHeight: ' + tg.viewportStableHeight);

            // Проверяем ВСЕ доступные методы
            var methods = ['requestFullscreen','lockOrientation','disableVerticalSwipes','expand','enableClosingConfirmation','setHeaderColor','setBackgroundColor'];
            methods.forEach(function(m) {
                dlog('  ' + m + ': ' + (typeof tg[m]));
            });

            tg.ready();
            dlog('ready() OK');

            // disableVerticalSwipes
            try { tg.disableVerticalSwipes(); dlog('disableVerticalSwipes OK'); } catch(e) { dlog('disableVerticalSwipes ERR: ' + e.message); }

            // Слушаем fullscreen события
            if (tg.onEvent) {
                tg.onEvent('fullscreenChanged', function() {
                    dlog('>>> fullscreenChanged: ' + tg.isFullscreen);
                    dlog('>>> window now: ' + window.innerWidth + 'x' + window.innerHeight);
                });
                tg.onEvent('fullscreenFailed', function(e) {
                    dlog('>>> fullscreenFailed: ' + JSON.stringify(e));
                });
                dlog('Event listeners registered');
            }

            // СПОСОБ 1: requestFullscreen БЕЗ await (синхронный вызов)
            dlog('--- Calling requestFullscreen ---');
            try {
                tg.requestFullscreen();
                dlog('requestFullscreen() returned OK');
            } catch(e) {
                dlog('requestFullscreen() THREW: ' + e.message);
            }

            // Проверяем через 1 секунду
            setTimeout(function() {
                dlog('--- After 1s ---');
                dlog('isFullscreen: ' + tg.isFullscreen);
                dlog('window: ' + window.innerWidth + 'x' + window.innerHeight);

                // lockOrientation после задержки
                dlog('--- Calling lockOrientation ---');
                try {
                    tg.lockOrientation('landscape');
                    dlog('lockOrientation() returned OK');
                } catch(e) {
                    dlog('lockOrientation() THREW: ' + e.message);
                }

                // Проверяем через ещё 1 секунду
                setTimeout(function() {
                    dlog('--- After 2s ---');
                    dlog('isFullscreen: ' + tg.isFullscreen);
                    dlog('window: ' + window.innerWidth + 'x' + window.innerHeight);
                    dlog('orientation: ' + (screen.orientation ? screen.orientation.type : 'N/A'));
                }, 1000);
            }, 1000);

        } else {
            dlog('NOT in Telegram');
        }

        // Запуск игры через 3 секунды
        setTimeout(function() {
            dlog('--- Starting game ---');
            try {
                var game = new gdjs.RuntimeGame(gdjs.projectData, {});
                game.getRenderer().createStandardCanvas(document.body);
                game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
                game.loadAllAssets(function() {
                    dlog('Game running!');
                    game.startGameLoop();
                });
            } catch(e) {
                dlog('GAME ERROR: ' + e.message);
            }
        }, 3000);
    </script>
