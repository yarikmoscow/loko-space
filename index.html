<div id="game-container"></div>

<script>
(function() {
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var isPortrait = vh > vw;

    // Если портрет — поворачиваем контейнер
    if (isPortrait) {
        var container = document.getElementById('game-container');
        container.style.transform = 'rotate(90deg)';
        container.style.width = vh + 'px';
        container.style.height = vw + 'px';
    }

    // Перехват тачей в capture phase — ДО GDevelop
    if (isPortrait) {
        function transformCoords(clientX, clientY) {
            return {
                x: vh - clientY,
                y: clientX
            };
        }

        function patchTouches(e) {
            for (var i = 0; i < e.changedTouches.length; i++) {
                var t = e.changedTouches[i];
                var r = transformCoords(t.clientX, t.clientY);
                Object.defineProperty(t, 'clientX', { value: r.x, writable: false });
                Object.defineProperty(t, 'clientY', { value: r.y, writable: false });
                Object.defineProperty(t, 'pageX', { value: r.x, writable: false });
                Object.defineProperty(t, 'pageY', { value: r.y, writable: false });
            }
        }

        document.addEventListener('touchstart', patchTouches, true);
        document.addEventListener('touchmove', patchTouches, true);
        document.addEventListener('touchend', patchTouches, true);
    }

    // Перехватываем добавление canvas в body — перемещаем в контейнер
    var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
            for (var j = 0; j < mutations[i].addedNodes.length; j++) {
                var node = mutations[i].addedNodes[j];
                if (node.tagName === 'CANVAS') {
                    var cont = document.getElementById('game-container');
                    cont.appendChild(node);
                    observer.disconnect();
                    return;
                }
            }
        }
    });
    observer.observe(document.body, { childList: true });

    // Запуск GDevelop — canvas создаётся в body, observer перемещает его в контейнер
    var game = new gdjs.RuntimeGame(gdjs.projectData, {});
    game.getRenderer().createStandardCanvas(document.body);
    game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
    game.loadAllAssets(function() {
        game.startGameLoop();
    });
})();
</script>
