    <div id="canvasArea"></div>

    <script>
        // ===== TELEGRAM MINI APP 2.0 INITIALIZATION =====
        // Это главный менеджер для всей инициализации

        const TelegramGameInit = {
            tg: null,
            isInitialized: false,
            isTelegramEnvironment: false,
            isFullscreen: false,
            isLandscape: false,

            // Главная функция инициализации
            init: async function() {
                console.log('[GameInit] Starting initialization...');

                // Проверка Telegram окружения
                if (window.Telegram && window.Telegram.WebApp) {
                    this.isTelegramEnvironment = true;
                    this.tg = window.Telegram.WebApp;
                    console.log('[GameInit] Telegram environment detected');

                    await this.initTelegram();
                } else {
                    console.log('[GameInit] Not in Telegram environment, using browser fallback');
                    this.initBrowserFallback();
                }

                this.isInitialized = true;
                console.log('[GameInit] Initialization complete');

                // Запускаем игру
                this.startGame();
            },

            // Инициализация в Telegram Mini App
            initTelegram: async function() {
                const tg = this.tg;

                // 1. Сообщаем Telegram что приложение готово
                tg.ready();
                console.log('[Telegram] ready() called');

                // 2. Отключаем вертикальные свайпы СРАЗУ
                if (typeof tg.disableVerticalSwipes === 'function') {
                    try {
                        tg.disableVerticalSwipes();
                        console.log('[Telegram] ✅ Vertical swipes disabled');
                    } catch(err) {
                        console.warn('[Telegram] ⚠️ disableVerticalSwipes failed:', err.message);
                    }
                }

                // 3. Запрашиваем полноэкранный режим
                if (typeof tg.requestFullscreen === 'function') {
                    try {
                        await tg.requestFullscreen();
                        this.isFullscreen = true;
                        console.log('[Telegram] ✅ Fullscreen mode activated');

                        // 4. ПОСЛЕ полноэкрана пытаемся заблокировать ориентацию
                        // Добавляем задержку, чтобы полноэкран полностью активировался
                        await new Promise(resolve => setTimeout(resolve, 100));

                        if (typeof tg.lockOrientation === 'function') {
                            try {
                                tg.lockOrientation('landscape');
                                this.isLandscape = true;
                                console.log('[Telegram] ✅ Landscape orientation locked');
                            } catch(err) {
                                console.warn('[Telegram] ⚠️ lockOrientation failed:', err.message);
                            }
                        } else {
                            console.warn('[Telegram] ⚠️ lockOrientation not available (older Telegram version)');
                        }
                    } catch(err) {
                        console.error('[Telegram] ❌ requestFullscreen failed:', err.message);

                        // Fallback на expand()
                        if (typeof tg.expand === 'function') {
                            try {
                                tg.expand();
                                console.log('[Telegram] 📌 Using expand() instead of fullscreen');
                            } catch(err2) {
                                console.warn('[Telegram] ⚠️ expand also failed:', err2.message);
                            }
                        }
                    }
                } else {
                    console.warn('[Telegram] ⚠️ requestFullscreen not available (older Telegram version)');

                    // Fallback на expand()
                    if (typeof tg.expand === 'function') {
                        try {
                            tg.expand();
                            console.log('[Telegram] 📌 Using expand() as primary method');
                        } catch(err) {
                            console.warn('[Telegram] ⚠️ expand failed:', err.message);
                        }
                    }
                }

                // 5. Слушаем события Telegram
                this.setupTelegramEventListeners();
            },

            // Слушаем события от Telegram
            setupTelegramEventListeners: function() {
                const tg = this.tg;

                // Событие изменения полноэкрана
                if (tg.onEvent) {
                    tg.onEvent('fullscreenChanged', (isFullscreen) => {
                        this.isFullscreen = isFullscreen;
                        console.log('[Telegram] Fullscreen changed:', isFullscreen);
                    });

                    tg.onEvent('fullscreenFailed', (error) => {
                        console.error('[Telegram] ❌ Fullscreen failed:', error);
                    });

                    // События активации/деактивации (пауза/возобновление)
                    tg.onEvent('deactivated', () => {
                        console.log('[Telegram] App deactivated (paused)');
                        window.dispatchEvent(new CustomEvent('gamePaused'));
                    });

                    tg.onEvent('activated', () => {
                        console.log('[Telegram] App activated (resumed)');
                        window.dispatchEvent(new CustomEvent('gameResumed'));
                    });
                }
            },

            // Инициализация в браузере (вне Telegram)
            initBrowserFallback: function() {
                console.log('[Browser] Initializing browser fallback');

                // Пытаемся перейти в полноэкран при первом клике
                const initOnFirstClick = () => {
                    console.log('[Browser] First interaction detected, requesting fullscreen and landscape');

                    // Полноэкран браузера
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.warn('[Browser] requestFullscreen failed:', err.message);
                        });
                    }

                    // Ориентация (работает на Android)
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(err => {
                            console.warn('[Browser] orientation.lock failed:', err.message);
                        });
                    }

                    // Убираем слушатель после первого клика
                    document.removeEventListener('click', initOnFirstClick);
                    document.removeEventListener('touchstart', initOnFirstClick);
                };

                document.addEventListener('click', initOnFirstClick);
                document.addEventListener('touchstart', initOnFirstClick);
            },

            // Обработка смены ориентации
            handleOrientationChange: function() {
                console.log('[Orientation] Changed to:', 
                    window.innerWidth > window.innerHeight ? 'landscape' : 'portrait'
                );
            },

            // Запуск игры GDevelop
            startGame: function() {
                console.log('[Game] Starting GDevelop game...');

                try {
                    var game = new gdjs.RuntimeGame(gdjs.projectData, {});
                    game.getRenderer().createStandardCanvas(document.getElementById('canvasArea'));
                    game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);

                    game.loadAllAssets(function() {
                        console.log('[Game] ✅ All assets loaded, starting game loop');
                        game.startGameLoop();
                    });
                } catch(err) {
                    console.error('[Game] ❌ Failed to start game:', err);
                }
            }
        };

        // ===== ЗАПУСК ИНИЦИАЛИЗАЦИИ =====
        window.addEventListener('load', function() {
            console.log('[Main] Page loaded, starting initialization');
            TelegramGameInit.init();
        });

        // Обработка смены ориентации
        window.addEventListener('orientationchange', function() {
            TelegramGameInit.handleOrientationChange();
        });

        // Глобальный обработчик ошибок
        window.addEventListener('error', function(event) {
            console.error('[Global Error]', event.error);
        });

        // Экспортируем для дебага в консоли браузера
        window.TelegramGameInit = TelegramGameInit;
    </script>
