<body>
    <div id="canvasArea"></div>
    <script>
    (function(){
        var game = new gdjs.RuntimeGame(gdjs.projectData, {});
        var area = document.getElementById("canvasArea");
        game.getRenderer().createStandardCanvas(area);
        game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);

        function fitCanvas(){
            var canvas = area.querySelector("canvas");
            if(!canvas) return;

            var screenW = window.innerWidth;
            var screenH = window.innerHeight;
            var isPortrait = screenH > screenW;

            // Размер игры из проекта
            var gameW = gdjs.projectData.properties.sizeOnStartupWindow.width || 1920;
            var gameH = gdjs.projectData.properties.sizeOnStartupWindow.height || 1080;
            var gameRatio = gameW / gameH;

            if(isPortrait){
                // Телефон в портрете: доступная область после поворота
                var availW = screenH; // высота экрана станет шириной
                var availH = screenW; // ширина экрана станет высотой

                // Вписываем с сохранением пропорций
                var scale = Math.min(availW / gameW, availH / gameH);
                var finalW = gameW * scale;
                var finalH = gameH * scale;

                // Центрируем
                var offsetX = (availW - finalW) / 2;
                var offsetY = (availH - finalH) / 2;

                area.style.position = "fixed";
                area.style.width = availW + "px";
                area.style.height = availH + "px";
                area.style.top = "0";
                area.style.left = "0";
                area.style.transform = "rotate(90deg)";
                area.style.transformOrigin = "top left";
                area.style.marginLeft = screenW + "px";
                area.style.background = "#000";

                canvas.style.position = "absolute";
                canvas.style.width = finalW + "px";
                canvas.style.height = finalH + "px";
                canvas.style.left = offsetX + "px";
                canvas.style.top = offsetY + "px";
            } else {
                // ПК или ландшафт: вписываем и центрируем
                var scale = Math.min(screenW / gameW, screenH / gameH);
                var finalW = gameW * scale;
                var finalH = gameH * scale;

                var offsetX = (screenW - finalW) / 2;
                var offsetY = (screenH - finalH) / 2;

                area.style.position = "fixed";
                area.style.width = screenW + "px";
                area.style.height = screenH + "px";
                area.style.top = "0";
                area.style.left = "0";
                area.style.transform = "none";
                area.style.marginLeft = "0";
                area.style.background = "#000";

                canvas.style.position = "absolute";
                canvas.style.width = finalW + "px";
                canvas.style.height = finalH + "px";
                canvas.style.left = offsetX + "px";
                canvas.style.top = offsetY + "px";
            }
        }

        game.loadAllAssets(function() {
            game.startGameLoop();
            // Даём движку 100мс создать canvas, потом подгоняем
            setTimeout(fitCanvas, 100);
            setTimeout(fitCanvas, 500);
            setTimeout(fitCanvas, 1000);
            window.addEventListener("resize", fitCanvas);
        });
    })();
    </script>
