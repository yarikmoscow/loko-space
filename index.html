    <div id="canvasArea"></div>
    <script>
    (function(){
        var area = document.getElementById("canvasArea");
        var game = new gdjs.RuntimeGame(gdjs.projectData, {});
        game.getRenderer().createStandardCanvas(area);
        game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);

        function applyLayout(){
            var sw = window.screen.availWidth || window.innerWidth;
            var sh = window.screen.availHeight || window.innerHeight;
            var iw = window.innerWidth;
            var ih = window.innerHeight;
            var isPortrait = ih > iw;

            if(isPortrait){
                // Телефон портрет: поворачиваем весь canvasArea
                // После поворота на 90deg: ширина = ih, высота = iw
                // GDevelop отрисовал canvas размером iw x ih (узкий высокий)
                // Нам нужно его масштабировать чтобы после поворота он заполнил экран

                var canvasW = iw; // реальная ширина canvas от GDevelop
                var canvasH = ih; // реальная высота canvas от GDevelop

                // После поворота на 90deg canvas станет: ширина=canvasH, высота=canvasW
                // Доступная область: ширина=iw, высота=ih
                // Нет, после rotate(90deg) визуально: ширина экрана=iw, высота=ih
                // Canvas повёрнут: его визуальная ширина = canvasH, визуальная высота = canvasW

                // Масштаб чтобы визуальная ширина canvasH заполнила ширину экрана iw
                var scaleX = iw / canvasH;
                // Масштаб чтобы визуальная высота canvasW заполнила высоту экрана ih
                var scaleY = ih / canvasW;

                // Берём минимальный чтобы вписать с сохранением пропорций
                var s = Math.min(scaleX, scaleY);

                var finalVisualW = canvasH * s;
                var finalVisualH = canvasW * s;

                var offsetX = (iw - finalVisualW) / 2;
                var offsetY = (ih - finalVisualH) / 2;

                area.style.cssText =
                    "position:fixed;"+
                    "left:0;top:0;"+
                    "width:"+canvasW+"px;"+
                    "height:"+canvasH+"px;"+
                    "transform-origin:0 0;"+
                    "transform:translate("+offsetX+"px,"+offsetY+"px) translate("+finalVisualH+"px, 0px) rotate(90deg) scale("+s+");"+
                    "overflow:hidden;background:#000;";
            } else {
                // ПК / ландшафт: вписываем и центрируем
                var canvas = area.querySelector("canvas");
                var canvasW = canvas ? canvas.width : iw;
                var canvasH = canvas ? canvas.height : ih;

                var scaleX = iw / canvasW;
                var scaleY = ih / canvasH;
                var s = Math.min(scaleX, scaleY);

                var finalW = canvasW * s;
                var finalH = canvasH * s;
                var offsetX = (iw - finalW) / 2;
                var offsetY = (ih - finalH) / 2;

                area.style.cssText =
                    "position:fixed;"+
                    "left:0;top:0;"+
                    "width:"+canvasW+"px;"+
                    "height:"+canvasH+"px;"+
                    "transform-origin:0 0;"+
                    "transform:translate("+offsetX+"px,"+offsetY+"px) scale("+s+");"+
                    "overflow:hidden;background:#000;";
            }
        }

        game.loadAllAssets(function(){
            game.startGameLoop();
            setTimeout(applyLayout, 200);
            setTimeout(applyLayout, 600);
            setTimeout(applyLayout, 1500);
            setTimeout(applyLayout, 3000);
            window.addEventListener("resize", function(){ setTimeout(applyLayout, 100); });
        });
    })();
    </script>
