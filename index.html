<body>
    <div id="game-container"></div>

    <script>
        var isTelegram = false;

        if (window.Telegram && window.Telegram.WebApp) {
            var tg = window.Telegram.WebApp;
            isTelegram = true;
            document.body.classList.add('tg-active');

            tg.ready();
            try { tg.expand(); } catch(e) {}
            try { tg.disableVerticalSwipes(); } catch(e) {}
            try { tg.requestFullscreen(); } catch(e) {}
            try { tg.setHeaderColor('#000000'); } catch(e) {}
            try { tg.setBackgroundColor('#000000'); } catch(e) {}

            setTimeout(function() {
                try { tg.lockOrientation('landscape'); } catch(e) {}
            }, 500);
        }

        // Запуск игры
        var container = document.getElementById('game-container');
        var game = new gdjs.RuntimeGame(gdjs.projectData, {});
        game.getRenderer().createStandardCanvas(container);
        game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
        game.loadAllAssets(function() {
            game.startGameLoop();
        });
    </script>
