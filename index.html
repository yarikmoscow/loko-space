<script>
(function() {
    var game = new gdjs.RuntimeGame(gdjs.projectData, {});
    game.getRenderer().createStandardCanvas(document.body);
    game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);

    // Перехват тачей — пересчёт координат из повёрнутого экрана
    var canvas = document.querySelector('canvas');

    canvas.addEventListener('touchstart', function(e) {
        e.stopPropagation();
        var touches = e.changedTouches;
        for (var i = 0; i < touches.length; i++) {
            var t = touches[i];
            var rect = canvas.getBoundingClientRect();
            var normX = (t.clientX - rect.left) / rect.width;
            var normY = (t.clientY - rect.top) / rect.height;
            var gameX = normY * 1920;
            var gameY = (1 - normX) * 1080;
            game.getInputManager().onTouchStart(t.identifier, gameX + rect.left, gameY + rect.top);
        }
    }, true);

    canvas.addEventListener('touchmove', function(e) {
        e.stopPropagation();
        var touches = e.changedTouches;
        for (var i = 0; i < touches.length; i++) {
            var t = touches[i];
            var rect = canvas.getBoundingClientRect();
            var normX = (t.clientX - rect.left) / rect.width;
            var normY = (t.clientY - rect.top) / rect.height;
            var gameX = normY * 1920;
            var gameY = (1 - normX) * 1080;
            game.getInputManager().onTouchMove(t.identifier, gameX + rect.left, gameY + rect.top);
        }
    }, true);

    canvas.addEventListener('touchend', function(e) {
        e.stopPropagation();
        var touches = e.changedTouches;
        for (var i = 0; i < touches.length; i++) {
            game.getInputManager().onTouchEnd(touches[i].identifier);
        }
    }, true);

    game.loadAllAssets(function() {
        game.startGameLoop();
    });
})();
</script>
