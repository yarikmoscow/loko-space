<body>
    <div id="debugLog"></div>
    <button id="debugClose" onclick="document.getElementById('debugLog').style.display='none'; this.style.display='none';">✕ ЗАКРЫТЬ ЛОГ</button>

    <script>
        // Отладочный лог на экране
        function dlog(msg) {
            var el = document.getElementById('debugLog');
            if (el) {
                el.textContent += msg + '\n';
                el.scrollTop = el.scrollHeight;
            }
            console.log(msg);
        }

        window.onerror = function(msg, url, line) {
            dlog('ERROR: ' + msg + ' line:' + line);
        };

        dlog('=== PAGE LOADED ===');
        dlog('URL: ' + location.href);
        dlog('UserAgent: ' + navigator.userAgent.substr(0, 80));

        // Проверка Telegram
        if (window.Telegram && window.Telegram.WebApp) {
            var tg = window.Telegram.WebApp;
            dlog('TG detected, version: ' + tg.version);
            dlog('TG platform: ' + (tg.platform || 'unknown'));
            dlog('TG initData: ' + (tg.initData ? 'YES (' + tg.initData.length + ' chars)' : 'EMPTY'));
            dlog('TG isExpanded: ' + tg.isExpanded);
            dlog('requestFullscreen: ' + (typeof tg.requestFullscreen));
            dlog('lockOrientation: ' + (typeof tg.lockOrientation));
            dlog('disableVerticalSwipes: ' + (typeof tg.disableVerticalSwipes));
            dlog('expand: ' + (typeof tg.expand));

            tg.ready();
            dlog('tg.ready() called');

            // disableVerticalSwipes
            if (typeof tg.disableVerticalSwipes === 'function') {
                try { tg.disableVerticalSwipes(); dlog('disableVerticalSwipes: OK'); }
                catch(e) { dlog('disableVerticalSwipes FAIL: ' + e.message); }
            }

            // Слушаем события
            if (tg.onEvent) {
                tg.onEvent('fullscreenChanged', function() {
                    dlog('EVENT fullscreenChanged, isFullscreen: ' + tg.isFullscreen);
                });
                tg.onEvent('fullscreenFailed', function(err) {
                    dlog('EVENT fullscreenFailed: ' + JSON.stringify(err));
                });
            }

            // requestFullscreen
            if (typeof tg.requestFullscreen === 'function') {
                try {
                    tg.requestFullscreen();
                    dlog('requestFullscreen: CALLED');
                } catch(e) {
                    dlog('requestFullscreen FAIL: ' + e.message);
                }

                // lockOrientation через 500мс
                setTimeout(function() {
                    if (typeof tg.lockOrientation === 'function') {
                        try {
                            tg.lockOrientation('landscape');
                            dlog('lockOrientation landscape: CALLED');
                        } catch(e) {
                            dlog('lockOrientation FAIL: ' + e.message);
                        }
                    } else {
                        dlog('lockOrientation: NOT AVAILABLE');
                    }
                }, 500);
            } else {
                dlog('requestFullscreen: NOT AVAILABLE');
                if (typeof tg.expand === 'function') {
                    try { tg.expand(); dlog('expand: OK'); }
                    catch(e) { dlog('expand FAIL: ' + e.message); }
                }
            }
        } else {
            dlog('NOT in Telegram');
            // Браузерный фоллбек при клике
            document.addEventListener('click', function() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(function(){});
                }
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(function(){});
                }
            }, { once: true });
        }

        // Запуск игры через 1 секунду (чтобы логи успели показаться)
        setTimeout(function() {
            dlog('Starting GDevelop game...');
            try {
                var game = new gdjs.RuntimeGame(gdjs.projectData, {});
                game.getRenderer().createStandardCanvas(document.body);
                game.getRenderer().bindStandardEvents(game.getInputManager(), window, document);
                game.loadAllAssets(function() {
                    dlog('Assets loaded, game loop started');
                    game.startGameLoop();
                });
            } catch(e) {
                dlog('GAME FATAL: ' + e.message);
            }
        }, 1000);
    </script>
